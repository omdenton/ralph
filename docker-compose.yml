services:
  ralph:
    build: .
    container_name: ralph
    volumes:
      # Mount the entire parent directory (ralph-loop) to /app
      - ..:/app
      # Mount Claude CLI credentials (for Pro subscription auth)
      - ~/.claude:/home/ralph/.claude
      - ~/.claude.json:/home/ralph/.claude.json
      # Mount GitHub CLI credentials (for private repo creation + push)
      - ~/.config/gh:/home/ralph/.config/gh
      # Mount SSH keys (for git SSH access to GitHub)
      - ~/.ssh:/home/ralph/.ssh:ro
      # Mount Gemini CLI credentials (for OAuth auth)
      - ~/.gemini:/home/ralph/.gemini
    environment:
      # Long-lived OAuth token from 'claude setup-token' (uses Pro subscription)
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      # Gemini API key from https://aistudio.google.com/apikey
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Override the GitHub repo name (defaults to working directory name)
      - RALPH_REPO_NAME=${RALPH_REPO_NAME:-ralph-shop}
      # Shop visualiser port
      - SHOP_PORT=${SHOP_PORT:-8080}
    ports:
      - "${SHOP_PORT:-8080}:${SHOP_PORT:-8080}"
    # Resource limits - adjust as needed
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    command: /app/agent/start.sh
    # Keep container running for interactive use
    stdin_open: true
    tty: true
    # Network access enabled by default - remove for isolation
    # network_mode: none
    working_dir: /app/project
